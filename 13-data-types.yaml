- name: Devops course information
  hosts: local
  connection: local
  vars:
    course_name: "Devops with AWS" #string
    Duration: 120 #number
    topics: #list
    - linux
    - shell
    - ansible
    - AWS
    live: true #bollean
    tools:
      ci: jenkins
      cloud: aws
      containerization: docker
  tasks:
  - name: Print course information
    ansible.builtin.debug:
      msg: "Hello im learing {{ course_name }}, Duration: {{ Duration }}, topics are: {{ topics }},is it {{ live }}"
