- name: variables
  hosts: local
  connection: local
  vars:
    COURSE: "Devops with AWS"
    DURATION: "120hrs"
    TRAINER: Sivareddy
  tasks:
  - name: print the variables
    vars:
      COURSE: Ansible
      ansible.builtin.debug:
        msg: "Course is {{ COURSE }}, Duration is {{ DURATION }}, Trainer is {{ TRAINER }}"