- name: filter
  hosts: local
  connection: local
  tasks:
  - name: handle undefilne variables
    ansible.builtin.debug:
      msg: "Hello {{ person | default ('Ramesh') }}"

  - name: convert list to string
    vars:
      fruits: "apple,mangoe,banana"
    ansible.builtin.debug:
      msg: "fruits are: {{ fruits | split(',') }}"

  - name: convert map into list
    vars:
      course:
        name: ansible
        duaration: 10hrs
        trainer: Sivareddy
    ansible.builtin.debug:
      msg: "Course info: {{ course | dict2items }}"

  - name: convert list into item
    vars:
      course:
      - {'key': 'name', 'value': 'ansible'}
      - {'key': 'duaration', 'value': '10hrs'}
      - {'key': 'trainer', 'value': 'Sivareddy'}
    ansible.builtin.debug:
      msg: "course info: {{ course | items2dict }}"

  - name: convert upper to lower
    vars:
      name: "Venkata Siva Reddy Kanakanti"
    ansible.builtin.debug:
      msg: "Hello {{ name | lower }}"

  - name: convert lower to upper
    vars:
      name: "Venkata Siva Reddy Kanakanti"
    ansible.builtin.debug:
      msg: "Hello {{ name | upper }}"

  - name:  print min and max
    vars:
      numbers: [1,10,20,30,40,50,60,70,80,90]
    ansible.builtin.debug:
      msg: "Min is: {{ numbers | min }} Max is: {{ numbers | max }}"

  - name: check ipaddress is valid or not
    vars:
      ip: "2568.255.245.256"
    ansible.builtin.debug:
      msg: "{{ ip | ansible.utils.ipaddr }}"